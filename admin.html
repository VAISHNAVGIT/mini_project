<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cattle Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="theme.js"></script>
    <script>
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="dashboard-container" style="max-width: 1400px;">
        <header class="glass-header">
            <div class="logo">
                <div class="emoji-logo">🐄</div>
                <h1>Admin<span>Dashboard</span></h1>
            </div>
            <div style="display:flex; gap:1.5rem; align-items:center;">
                <div class="status-indicator" id="connStatus">
                    <span class="pulsing-dot warning"></span>
                    Connecting...
                </div>
                <button class="theme-btn" id="themeIcon" onclick="toggleTheme()" title="Toggle Theme"></button>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
        </header>

        <!-- Live Sensor Feeds -->
        <h2 style="margin-top: 1rem; color: var(--accent-blue);">Live Sensor Feed</h2>
        <main class="grid-layout">
            <div class="card glass-card">
                <div class="card-header">
                    <div class="icon-bg heart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></div>
                    <h3>Heart Rate</h3>
                </div>
                <div class="value-container"><span id="bpmVal" class="big-value">--</span><span class="unit">BPM</span></div>
            </div>

            <div class="card glass-card">
                <div class="card-header">
                    <div class="icon-bg temp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg></div>
                    <h3>Body Temp</h3>
                </div>
                <div class="value-container"><span id="tempVal" class="big-value">--</span><span class="unit">°C</span></div>
            </div>

            <div class="card glass-card">
                <div class="card-header">
                    <div class="icon-bg activity"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></div>
                    <h3>Activity Steps</h3>
                </div>
                <div class="value-container"><span id="stepsVal" class="big-value">--</span><span class="unit">Steps</span></div>
            </div>
            
            <div class="card glass-card">
                <div class="card-header">
                    <h3>Farm Supplies Control</h3>
                </div>
                <div style="display:flex; flex-direction:column; gap:1rem;">
                    <div>
                        <label style="font-size: 0.9rem; color: var(--text-secondary);">Water Level (%)</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="number" id="inputWater" class="crud-input" placeholder="e.g. 85">
                            <button id="btnUpdateWater" class="crud-btn">Update</button>
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; color: var(--text-secondary);">Food Level (kg)</label>
                        <div style="display:flex; gap:0.5rem;">
                            <input type="number" id="inputFood" class="crud-input" placeholder="e.g. 400">
                            <button id="btnUpdateFood" class="crud-btn">Update</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Farmer Instructions Checklist Management -->
             <div class="card glass-card span-2-cols" id="adminInstructionsCard">
                <div class="card-header">
                    <div class="icon-bg activity" style="background: rgba(245, 158, 11, 0.15); color: #f59e0b;">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path></svg>
                    </div>
                    <h3>Farmer Instructions Management</h3>
                </div>
                <div style="display:flex; flex-direction:column; gap:1rem; height: 100%;">
                    <div style="display:flex; gap:0.5rem;">
                        <input type="text" id="inputInstruction" class="crud-input" placeholder="e.g. Check water pump in sector 4">
                        <button type="button" id="btnAddInstruction" class="crud-btn" style="white-space: nowrap;">Add Task</button>
                    </div>
                    <div id="adminInstructionsList" class="checklist-container" style="max-height: 250px; overflow-y: auto; padding-right: 0.5rem; flex: 1;">
                        <!-- Instructions injected by JS -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Cattle Database -->
        <h2 style="margin-top: 2rem; color: var(--accent-blue);">Cattle Database Management</h2>
        <div class="glass-card" style="padding: 2rem;">
            <form id="cattleForm" class="crud-form">
                <input type="hidden" id="editCattleId">
                <div class="form-grid">
                    <div><label>Cattle ID / Tag #</label><input type="text" id="cId" class="crud-input" required></div>
                    <div><label>Name</label><input type="text" id="cName" class="crud-input" required></div>
                    <div><label>Age (Years)</label><input type="number" step="0.1" id="cAge" class="crud-input" required></div>
                    <div><label>Date of Birth</label><input type="date" id="cDob" class="crud-input" required></div>
                    <div><label>Health Status</label><input type="text" id="cHealth" class="crud-input" required></div>
                    <div><label>Last Checkup</label><input type="date" id="cCheckup" class="crud-input" required></div>
                    <div style="grid-column: span 2;"><label>Medical History</label><input type="text" id="cMedical" class="crud-input" required></div>
                    <div style="grid-column: span 2;"><label>Veterinarian Message (Read-Only)</label><input type="text" id="cVetMsg" class="crud-input" readonly disabled style="opacity:0.6;"></div>
                </div>
                <div style="margin-top:1.5rem; display:flex; gap:1rem;">
                    <button type="submit" id="btnSaveCattle" class="crud-btn">Save Cattle</button>
                    <button type="button" id="btnClearCattle" class="crud-btn" style="background:var(--bg-tertiary);">Clear Form</button>
                </div>
            </form>

            <div style="margin-top: 2rem; overflow-x: auto;">
                <table class="crud-table">
                    <thead>
                        <tr>
                            <th>ID</th><th>Name</th><th>Age</th><th>DOB</th><th>Health Status</th><th>Last Checkup</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cattleTableBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Inject Specific Internal CSS for CRUD forms to bypass any styling gaps -->
    <style>
        .crud-input {
            width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--glass-border); border-radius: 8px;
            background: rgba(0,0,0,0.2); color: var(--text-primary); outline: none; transition: border-color 0.3s;
        }
        .crud-input:focus { border-color: var(--accent-blue); }
        .crud-btn {
            background: var(--accent-blue); color: #fff; border: none; padding: 0.75rem 1.5rem;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: transform 0.2s, box-shadow 0.2s;
        }
        .crud-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .crud-table { width: 100%; border-collapse: collapse; margin-top: 1rem; text-align: left; }
        .crud-table th, .crud-table td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--glass-border); white-space: nowrap; }
        .crud-table th { background: rgba(0,0,0,0.2); color: var(--text-secondary); font-weight: 600; }
        .action-btn { background: none; border: none; color: var(--accent-blue); cursor: pointer; font-weight: 600; margin-right: 0.5rem; }
        .action-btn.del { color: var(--accent-red); }
        .action-btn:hover { text-decoration: underline; }
        
        @media (max-width: 768px) { 
            .form-grid { grid-template-columns: 1fr; } 
            .form-grid > div[style*="grid-column: span 2"] { grid-column: span 1 !important; }
            .crud-table th, .crud-table td { padding: 0.75rem 0.5rem; font-size: 0.85rem; }
        }
        @media (max-width: 480px) {
            .crud-btn { width: 100%; margin-bottom: 0.5rem; }
            .form-grid { gap: 0.75rem; }
        }
    </style>

    <script type="module" src="admin.js"></script>
</body>
</html>
